<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #121212;
            color: #fff;
        }
        #game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        canvas {
            border: 2px solid #fff;
            background: #0a0a0a;
        }
        .info {
            display: flex;
            gap: 16px;
            font-size: 16px;
        }
        .button {
            padding: 10px 18px;
            border: none;
            background: #1f6feb;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
        }
        .button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>贪吃蛇</h1>
        <div class="info">
            <div>得分: <span id="score">0</span></div>
            <div>速度: <span id="speed">5</span></div>
        </div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <button class="button" id="restart">重新开始</button>
        <div>使用方向键控制蛇移动。</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed');
        const restartBtn = document.getElementById('restart');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let velocity = { x: 0, y: 0 };
        let apple = { x: 15, y: 15 };
        let score = 0;
        let speed = 5;
        let gameOver = false;
        let moveQueue = [];

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            velocity = { x: 0, y: 0 };
            apple = { x: 15, y: 15 };
            score = 0;
            speed = 5;
            gameOver = false;
            moveQueue = [];
            scoreEl.textContent = score;
            speedEl.textContent = speed;
        }

        function placeApple() {
            let newApple;
            while (true) {
                newApple = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                if (!snake.some(part => part.x === newApple.x && part.y === newApple.y)) {
                    break;
                }
            }
            apple = newApple;
        }

        function update() {
            if (gameOver) return;

            if (moveQueue.length) {
                const nextMove = moveQueue.shift();
                if ((nextMove.x !== -velocity.x || nextMove.y !== -velocity.y) || velocity.x === 0 && velocity.y === 0) {
                    velocity = nextMove;
                }
            }

            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            if (snake.some(part => part.x === head.x && part.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === apple.x && head.y === apple.y) {
                score += 10;
                speed = Math.min(12, speed + 0.5);
                scoreEl.textContent = score;
                speedEl.textContent = speed.toFixed(1);
                placeApple();
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#e63946';
            ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize, gridSize);

            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#f4a261' : '#2a9d8f';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 10);
                ctx.font = '18px Arial';
                ctx.fillText('点击重新开始', canvas.width / 2, canvas.height / 2 + 24);
            }
        }

        function endGame() {
            gameOver = true;
        }

        function gameLoop() {
            update();
            draw();
            const interval = 1000 / speed;
            if (!gameOver) {
                setTimeout(gameLoop, interval);
            }
        }

        window.addEventListener('keydown', event => {
            const key = event.key;
            if (key === 'ArrowUp') moveQueue.push({ x: 0, y: -1 });
            if (key === 'ArrowDown') moveQueue.push({ x: 0, y: 1 });
            if (key === 'ArrowLeft') moveQueue.push({ x: -1, y: 0 });
            if (key === 'ArrowRight') moveQueue.push({ x: 1, y: 0 });
        });

        restartBtn.addEventListener('click', () => {
            resetGame();
            gameLoop();
        });

        resetGame();
        gameLoop();
    </script>
</body>
</html>
